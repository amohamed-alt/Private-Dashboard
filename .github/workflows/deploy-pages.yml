name: Build Dashboard Assets Into Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip dashboard build]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare static files for branch-based GitHub Pages
        run: |
          rm -rf assets
          cp -R dist/assets assets
          cp dist/index.html index.html
          sed -i 's#\./data/live-data.js#./public/data/live-data.js#g' index.html
          touch .nojekyll

      - name: Commit production build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          if git diff --cached --quiet; then
            echo "No production asset changes"
            exit 0
          fi
          git commit -m "Build dashboard production assets [skip dashboard build]"
          git push origin main
