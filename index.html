<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retention Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">R</div>
      <div>
        <strong>Retention Dashboard</strong>
        <span>Fadi · Jihad · Faizan</span>
      </div>
    </div>

    <nav class="nav" aria-label="Dashboard navigation">
      <button class="nav-item active" data-tab="overview">Retention Overview</button>
      <button class="nav-item" data-tab="Fadi">Fadi</button>
      <button class="nav-item" data-tab="Jihad">Jihad</button>
      <button class="nav-item" data-tab="Faizan">Faizan</button>
      <button class="nav-item" data-tab="compare">Plan vs Calculated</button>
      <button class="nav-item" data-tab="accounts">Accounts</button>
      <button class="nav-item" data-tab="actions">Action Center</button>
      <button class="nav-item" data-tab="quality">Data Quality</button>
    </nav>

    <div class="sidebar-foot" id="sidebarMeta">Loading retention data...</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="eyebrow">Retention only · Acquisition hidden</div>
        <h1 id="pageTitle">Retention Overview</h1>
        <p id="pageSubtitle">Loading latest n8n sync...</p>
      </div>
      <div class="scenario-switch" id="scenarioSwitch" aria-label="Forecast scenario selector">
        <button data-scenario="worst">Worst</button>
        <button data-scenario="medium" class="active">Medium</button>
        <button data-scenario="bestExcludingLost">Best</button>
        <button data-scenario="bestIncludingLost">Best + Lost</button>
      </div>
    </header>

    <section class="alert" id="riskBanner"></section>
    <section id="app" class="app-shell">
      <div class="loading-card">Loading retention dashboard...</div>
    </section>
  </main>

  <script>
    (function loadDashboardData() {
      const version = Date.now();
      const dataScript = document.createElement('script');
      dataScript.src = './data/live-data.js?v=' + version;
      dataScript.onload = function () {
        const appScript = document.createElement('script');
        appScript.src = './app.js?v=' + version;
        document.body.appendChild(appScript);
      };
      dataScript.onerror = function () {
        document.getElementById('app').innerHTML = '<div class="empty-state"><h2>Could not load data/live-data.js</h2><p>Run the n8n workflow and confirm GitHub has a valid live-data.js file.</p></div>';
      };
      document.body.appendChild(dataScript);
    })();
  </script>
</body>
</html>
