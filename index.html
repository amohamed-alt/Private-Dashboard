<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#315c52" />
    <title>Retention Command Center</title>
    <link rel="preload" href="./data/live-data.js" as="script" />
    <style>
      html,body,#root{min-height:100%;margin:0}
      body{background:#f5f2ea;font-family:Inter,Segoe UI,Arial,sans-serif}
      .boot{min-height:100vh;display:grid;place-items:center;padding:24px;color:#284b42}
      .boot-card{width:min(460px,92vw);padding:28px;border:1px solid #dfe7e3;border-radius:24px;background:#fff;box-shadow:0 18px 48px rgba(35,58,52,.10)}
      .boot-row{display:flex;align-items:center;gap:14px}
      .boot-mark{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;background:#355d53;color:#fff;font-weight:800;font-size:20px}
      .boot h1{margin:0;font-size:18px}.boot p{margin:6px 0 0;color:#71807b;font-size:13px}
      .boot-line{height:8px;margin-top:22px;border-radius:999px;background:linear-gradient(90deg,#edf4f1 20%,#bad0c7 50%,#edf4f1 80%);background-size:220% 100%;animation:boot 1.1s linear infinite}
      @keyframes boot{to{background-position:-220% 0}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="boot-card">
          <div class="boot-row">
            <div class="boot-mark">R</div>
            <div><h1>Retention Command Center</h1><p>Loading the latest retention portfolio…</p></div>
          </div>
          <div class="boot-line"></div>
        </div>
      </div>
    </div>
    <script type="module">
      await new Promise((resolve, reject) => {
        const dataScript = document.createElement('script');
        dataScript.src = './data/live-data.js';
        dataScript.onload = resolve;
        dataScript.onerror = reject;
        document.head.appendChild(dataScript);
      });
      await import('./src/main.jsx');
    </script>
  </body>
</html>
