<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#315c52" />
  <title>Retention Command Center</title>
  <link rel="stylesheet" href="./style-browser.css?v=4" />
  <style>
    html,body,#root{min-height:100%;margin:0}
    .boot{min-height:100vh;display:grid;place-items:center;background:#f5f2ea;color:#284b42;font-family:Inter,Segoe UI,Arial,sans-serif}
    .boot-card{width:min(460px,92vw);padding:28px;border:1px solid #dfe7e3;border-radius:24px;background:#fff;box-shadow:0 18px 48px rgba(35,58,52,.10)}
    .boot-row{display:flex;align-items:center;gap:14px}.boot-mark{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;background:#355d53;color:#fff;font-weight:800;font-size:20px}.boot h1{margin:0;font-size:18px}.boot p{margin:6px 0 0;color:#71807b;font-size:13px}.boot-line{height:8px;margin-top:22px;border-radius:999px;background:linear-gradient(90deg,#edf4f1 20%,#bad0c7 50%,#edf4f1 80%);background-size:220% 100%;animation:boot 1.1s linear infinite}@keyframes boot{to{background-position:-220% 0}}.boot-error{color:#b23b3b;margin-top:14px;font-size:12px;line-height:1.5}
  </style>
  <script type="importmap">
    {
      "imports": {
        "https://esm.sh/react@19.1.0": "https://cdn.jsdelivr.net/npm/react@19.1.0/+esm",
        "https://esm.sh/react-dom@19.1.0/client": "https://cdn.jsdelivr.net/npm/react-dom@19.1.0/client/+esm",
        "https://esm.sh/htm@3.1.1": "https://cdn.jsdelivr.net/npm/htm@3.1.1/+esm"
      }
    }
  </script>
</head>
<body>
  <div id="root">
    <div class="boot"><div class="boot-card"><div class="boot-row"><div class="boot-mark">R</div><div><h1>Retention Command Center</h1><p>Loading the latest retention portfolio…</p></div></div><div class="boot-line"></div><div id="bootError" class="boot-error"></div></div></div>
  </div>
  <script>
    function showBootError(message) {
      var box = document.getElementById('bootError');
      if (box) box.textContent = message;
    }
    window.addEventListener('error', function(event) {
      showBootError('Loading failed: ' + (event.message || 'Unknown error') + '.');
    });
    window.addEventListener('unhandledrejection', function(event) {
      showBootError('Loading failed: ' + (event.reason && event.reason.message ? event.reason.message : 'Module could not load') + '.');
    });
    setTimeout(function() {
      if (document.querySelector('.boot')) showBootError('The dashboard module did not start. Please refresh once after 10 seconds.');
    }, 10000);
  </script>
  <script src="./public/data/live-data.js?v=4"></script>
  <script type="module" src="./app-browser.js?v=4"></script>
</body>
</html>
